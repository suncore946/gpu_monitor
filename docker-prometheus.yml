version: '3'
services:
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - /opt/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      # 把原来的匿名卷真实路径明确挂载上来，保护你的历史数据
      - /var/lib/docker/volumes/f182601a0ff61d3d34515cdc151a321aab53b328193c08af0cecdbbbd0dade13/_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=1460d'  # 在这里指定保留 4 年